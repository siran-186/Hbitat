workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Build Android APK
        script: |
          curl -s -L -o gradle.zip https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q gradle.zip
          ./gradle-9.3.1/bin/gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk

